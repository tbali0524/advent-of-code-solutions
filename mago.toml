# Mago configuration file.
# @see https://mago.carthage.software/tools/overview
#
# minimum version: ^1.6.0

php-version = "8.5.0"

[source]
paths = ["src", "tests"]
includes = ["vendor"]

[parser]
enable-short-tags = false

# avoid using `mago fmt` altogether, its parenthesis handling is too strange
[formatter]
excludes = ["src/**/*.php", "tests/**/*.php"]
# preset = "default"
print-width = 120
empty-line-before-dangling-comments = false
empty-line-between-same-symbols = false
inline-empty-constructor-braces = false
parentheses-around-new-in-member-access = true
preserve-breaking-member-access-chain = true
preserve-breaking-argument-list = true
preserve-breaking-parameter-list = true
preserve-breaking-attribute-list = true
preserve-breaking-conditional-expression = true
space-before-closure-parameter-list-parenthesis = true

[linter]
integrations = ["phpunit"]

# custom linter rules, too many false-positives
[linter.rules]
assert-description = { enabled = false }
assertion-style = { enabled = true, style = "self" }
class-name = { enabled = false }
cyclomatic-complexity = { enabled = false }
excessive-nesting = { enabled = false }
excessive-parameter-list = { enabled = false }
halstead = { enabled = false }
identity-comparison = { enabled = false }
interface-name = { enabled = false }
kan-defect = { enabled = false }
literal-named-argument = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
no-else-clause = { enabled = false }
no-isset = { enabled = false }
no-nested-ternary = { enabled = false }
no-shorthand-ternary = { enabled = false }
prefer-early-continue = { enabled = false }
prefer-first-class-callable = { enabled = false }
readable-literal = { enabled = false }
single-class-per-file = { enabled = false }
tagged-todo = { enabled = false }
too-many-methods = { enabled = false }
too-many-properties = { enabled = false }
trait-name = { enabled = false }

[analyzer]
analyze-dead-code = true
check-arrow-function-missing-type-hints = true
check-closure-missing-type-hints = true
find-unused-definitions = true
find-unused-parameters = true
no-boolean-literal-comparison = true
trust-existence-checks = false
# custom analyzer rules, too many false-positives
ignore = [
    "docblock-type-mismatch",
    "impossible-assignment",
    "impossible-condition",
    "impossible-type-comparison",
    "incompatible-parameter-type",
    "invalid-argument",
    "invalid-array-index",
    "invalid-continue",
    "invalid-destructuring-source",
    "invalid-iterator",
    "invalid-operand",
    "invalid-property-access",
    "invalid-property-assignment-value",
    "invalid-return-statement",
    "less-specific-argument",
    "less-specific-nested-argument-type",
    "less-specific-nested-return-statement",
    "match-not-exhaustive",
    "mismatched-array-index",
    "missing-return-statement",
    "missing-template-parameter",
    "mixed-argument",
    "mixed-array-access",
    "mixed-array-assignment",
    "mixed-array-index",
    "mixed-assignment",
    "mixed-method-access",
    "mixed-operand",
    "mixed-property-access",
    "mixed-property-type-coercion",
    "mixed-return-statement",
    "non-existent-attribute-class",
    "non-existent-class-like",
    "no-value",
    "nullable-return-statement",
    "null-argument",
    "null-array-index",
    "null-operand",
    "possibly-false-operand",
    "possibly-invalid-argument",
    "possibly-invalid-operand",
    "possible-method-access-on-null",
    "possibly-null-argument",
    "possibly-null-array-access",
    "possibly-null-array-index",
    "possibly-null-operand",
    "possibly-null-property-access",
    "possibly-undefined-int-array-index",
    "possibly-undefined-variable",
    "property-type-coercion",
    "redundant-comparison",
    "redundant-condition",
    "redundant-docblock-type",
    "redundant-logical-operation",
    "redundant-null-coalesce",
    "reference-to-undefined-variable",
    "undefined-int-array-index",
]

# custom guard rules
[guard]
# mode = "default"
excludes = [
    "src/aoc.php",
    "src/run_class.php",
    "src/AocYYYYDayDD.php",
    "src/other/Aoc2017/Aoc2017Day01scr.php"
]

[guard.perimeter.layers]
core = ["@native", "TBali\\Aoc\\"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc\\"
permit = ["@native", "@self"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2015\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2016\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2017\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2018\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2019\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2020\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2021\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2022\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2023\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2024\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Aoc2025\\"
permit = ["@native", "@self", "@layer:core"]

[[guard.perimeter.rules]]
namespace = "TBali\\Tests\\"
permit = ["@native", "@self", "PHPUnit\\Framework\\"]

[[guard.structural.rules]]
on               = "TBali\\Aoc20*\\Aoc20*"
target           = "class"
must-be-named    = "Aoc20*"
must-be-final    = true
must-be-readonly = false
must-extend      = "TBali\\Aoc\\SolutionBase"
reason           = "Solution class must extend the abstact class SolutionBase."
